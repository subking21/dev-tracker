{% extends 'base.html' %}

{% block title %}Sign Up{% endblock title %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2>Sign Up</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Sign Up</button>
                <p class="mt-2">Already have an account? <a href="{% url 'website:login' %}">Login</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
